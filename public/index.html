<!DOCTYPE html>
<html>
<head>
  <title>NaijaSafe Live Dashboard</title>
  <style>
    body { font-family: Arial; background: #111; color: #fff; }
    .alert { padding: 10px; margin: 10px; border-left: 5px solid red; }
  </style>
</head>
<body>

<h1>🚨 NaijaSafe Live Alerts</h1>
<div id="alerts"></div>

<script>
async function loadAlerts() {
  const res = await fetch('/dashboard');
  const data = await res.json();

  const container = document.getElementById('alerts');
  container.innerHTML = '';

  data.forEach(a => {
    const div = document.createElement('div');
    div.className = 'alert';
    div.innerHTML = `<b>${a.location}</b><br>${a.category}<br>${a.description}`;
    container.appendChild(div);
  });
}

setInterval(loadAlerts, 2000);
loadAlerts();
</script>

</body>
</html>
